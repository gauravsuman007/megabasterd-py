name: Build desktop apps

# Builds the native desktop application (pywebview + PyInstaller) for macOS,
# Windows and Linux across the architectures GitHub's hosted runners can build
# natively, and publishes each build straight into a GitHub Release.
#
# Publishing model: a `create_release` job makes the release once, up front,
# then every build leg uploads its OWN asset into it (gh release upload). There
# is deliberately no aggregate job that waits for the whole matrix -- so a slow
# or starved platform (notably the scarce macOS-Intel runner) can never hold the
# release hostage; each asset simply appears when its leg finishes.
#
# PyInstaller cannot cross-compile, so each OS/arch is built on a matching
# runner. Coverage:
#     macOS   arm64 (macos-14, native Apple Silicon)
#             universal2 (macos-14, one .app for Intel + Apple Silicon)
#     Windows x64  (windows-latest)   x86 (32-bit Python)   arm64 (windows-11-arm)
#     Linux   x64  (ubuntu-latest)    arm64 (ubuntu-24.04-arm)
# The Intel Mac is served by the universal2 build (which also runs on Apple
# Silicon) rather than a dedicated macos-13 leg -- GitHub's free Intel runners
# are so scarce they routinely never get scheduled. macOS ships no 32-bit
# builds (the OS is 64-bit only), and 32-bit Linux is omitted -- WebKitGTK on
# i386 is effectively unmaintained and there is no hosted 32-bit Linux runner.
#
# These are the *slim* builds: no bundled ffmpeg (keeps the download small).
# Video thumbnails light up automatically if the user has ffmpeg/ffprobe on
# their system -- desktop.py widens PATH so a Homebrew/apt/manual install is
# found even when launched from Finder/Explorer.
#
# Triggers (mirrors the Docker publish workflow):
#   * push to the default branch that changes APP_VERSION in app/main.py
#     (a version bump) -> build + release.
#   * manual run with dry_run: true -> build every platform but publish nothing.
#
# No secrets required: the release is created with the built-in GITHUB_TOKEN.

on:
  push:
    branches: [main, master]
    paths: ['app/main.py']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build every platform but do NOT create a GitHub Release'
        type: boolean
        default: false

concurrency:
  group: desktop-release
  # A newer run supersedes an older one instead of queueing behind it -- so a
  # run stuck on a scarce runner can never block a fresh dispatch or version bump.
  cancel-in-progress: true

jobs:
  # Resolve the version and whether a build is warranted (a manual run always
  # builds; a push builds only when APP_VERSION actually changed).
  decide:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      build: ${{ steps.check.outputs.build }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2   # need the previous commit to compare APP_VERSION
      - id: check
        shell: bash
        run: |
          set -euo pipefail
          read_version() { grep -E '^APP_VERSION' "$1" | sed -E 's/.*"([^"]+)".*/\1/'; }
          VERSION="$(read_version app/main.py)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Manual run: building version $VERSION."
          else
            PREV="$(git show HEAD^:app/main.py 2>/dev/null | grep -E '^APP_VERSION' | sed -E 's/.*"([^"]+)".*/\1/' || true)"
            if [ "$VERSION" != "$PREV" ]; then
              echo "build=true" >> "$GITHUB_OUTPUT"
              echo "Version bumped: ${PREV:-<none>} -> $VERSION. Building."
            else
              echo "build=false" >> "$GITHUB_OUTPUT"
              echo "APP_VERSION unchanged ($VERSION); nothing to build."
            fi
          fi

  # Create the GitHub Release ONCE, up front, so the build legs can each upload
  # their own asset into it independently. This is the key to not letting one
  # slow/starved platform (notably the scarce macOS-Intel runner) hold the
  # release hostage: there is no aggregate job that waits for the whole matrix.
  # Skipped on a dry run. Idempotent -- re-running for an existing version just
  # reuses the release.
  create_release:
    needs: decide
    if: |
      needs.decide.outputs.build == 'true' &&
      !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.decide.outputs.version }}
    steps:
      - name: Ensure release v${{ needs.decide.outputs.version }} exists
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists; reusing it."
            exit 0
          fi
          # Build the notes with single-quoted echoes so backticks/pipes stay literal.
          {
            echo 'Native desktop builds of MegaBasterd-Py (pywebview + PyInstaller, slim / no bundled ffmpeg).'
            echo
            echo 'Download the archive for your platform, unzip, and run. Assets appear as each platform finishes building.'
            echo
            echo '| Platform | Asset |'
            echo '|---|---|'
            echo '| macOS (Apple Silicon, native) | `macos-arm64` |'
            echo '| macOS (Intel + Apple Silicon) | `macos-universal` |'
            echo '| Windows 64-bit | `windows-x64` |'
            echo '| Windows 32-bit | `windows-x86` |'
            echo '| Windows on ARM | `windows-arm64` |'
            echo '| Linux 64-bit | `linux-x64` |'
            echo '| Linux ARM64 | `linux-arm64` |'
            echo
            echo 'Video thumbnails require `ffmpeg` installed on your system; image thumbnails work out of the box. Linux additionally needs WebKitGTK (`libwebkit2gtk-4.1-0`) present at runtime. macOS/Windows builds are unsigned — approve on first launch (macOS: right-click, Open; Windows: More info, Run anyway).'
          } > "$RUNNER_TEMP/notes.md"
          gh release create "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "MegaBasterd v$VERSION" \
            --notes-file "$RUNNER_TEMP/notes.md"

  build:
    # always() so the matrix still runs on a dry run (when create_release is
    # skipped); the guard keeps it off when there's nothing to build.
    needs: [decide, create_release]
    if: always() && needs.decide.outputs.build == 'true'
    strategy:
      fail-fast: false   # one flaky platform must not sink the others
      matrix:
        include:
          - { os: macos-14,        target: macos-arm64,   pyarch: arm64 }
          - { os: windows-latest,  target: windows-x64,   pyarch: x64 }
          - { os: windows-latest,  target: windows-x86,   pyarch: x86 }
          - { os: windows-11-arm,  target: windows-arm64, pyarch: arm64 }
          - { os: ubuntu-latest,   target: linux-x64,     pyarch: x64 }
          - { os: ubuntu-24.04-arm, target: linux-arm64,  pyarch: arm64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    permissions:
      contents: write   # each leg uploads its own asset to the release
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.decide.outputs.version }}
      IS_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.pyarch }}

      # pywebview's GTK backend needs WebKitGTK + GObject-introspection at build
      # and run time; PyGObject/pycairo compile against the -dev headers.
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-0 libcairo2 gir1.2-gtk-3.0 \
            libwebkit2gtk-4.1-0 gir1.2-webkit2-4.1 \
            libgirepository-1.0-1 libgirepository1.0-dev \
            libcairo2-dev pkg-config

      - name: Install app + build tooling
        shell: bash
        run: |
          set -eux
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller pywebview
          if [ "${{ runner.os }}" = "Linux" ]; then
            # Pin to the last PyGObject line built against girepository-1.0.
            pip install "PyGObject==3.48.2" pycairo
          fi

      - name: Build with PyInstaller
        shell: bash
        run: pyinstaller --noconfirm --clean desktop.spec

      - name: Package (macOS .app)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -eux
          ditto -c -k --keepParent "dist/MegaBasterd.app" \
            "MegaBasterd-${VERSION}-${{ matrix.target }}.zip"

      - name: Package (Windows .exe)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -eux
          7z a "MegaBasterd-${VERSION}-${{ matrix.target }}.zip" "./dist/MegaBasterd.exe"

      - name: Package (Linux binary)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -eux
          zip -j "MegaBasterd-${VERSION}-${{ matrix.target }}.zip" "dist/MegaBasterd"

      # Keep the artifact on the run too (handy for a dry run, which publishes
      # nothing, and as a fallback if a later upload needs re-doing).
      - uses: actions/upload-artifact@v4
        with:
          name: MegaBasterd-${{ matrix.target }}
          path: MegaBasterd-*.zip
          if-no-files-found: error

      # Publish THIS leg's asset straight into the pre-created release. Because
      # every leg does this independently (and the release already exists), a
      # slow or starved platform never blocks the others -- its asset simply
      # arrives whenever that leg finishes. --clobber makes re-runs idempotent.
      - name: Upload asset to release
        if: env.IS_DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "v$VERSION" MegaBasterd-*.zip \
            --repo "$GITHUB_REPOSITORY" --clobber

  # macOS universal2 build: a single .app that runs natively on both Intel and
  # Apple Silicon Macs. This replaces the dedicated Intel (macos-13) leg, whose
  # runners are so scarce they routinely never get scheduled. It runs on the
  # plentiful Apple-Silicon runner instead.
  #
  # The trick to a working universal2 freeze is that EVERY bundled binary must
  # contain both the x86_64 and arm64 slices. `actions/setup-python` only ships
  # single-arch interpreters, and a plain `pip install` on an arm64 interpreter
  # pulls arm64-only wheels -- so we (1) install the official python.org
  # universal2 interpreter and (2) force universal2 wheels for every dependency
  # via `pip --platform ... --only-binary`. Using `wsproto` (pure Python) for
  # websockets avoids the one common dep (`websockets`' C speedups / `uvloop` /
  # `httptools`) that ships no universal2 wheel.
  build_macos_universal:
    needs: [decide, create_release]
    if: always() && needs.decide.outputs.build == 'true'
    runs-on: macos-14
    timeout-minutes: 40
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.decide.outputs.version }}
      IS_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
      # Universal2 CPython from python.org (macos11.pkg is the universal2 build).
      PY_VERSION: '3.12.8'
    steps:
      - uses: actions/checkout@v5

      - name: Install universal2 CPython from python.org
        shell: bash
        run: |
          set -euxo pipefail
          curl -fLo /tmp/python.pkg \
            "https://www.python.org/ftp/python/${PY_VERSION}/python-${PY_VERSION}-macos11.pkg"
          sudo installer -pkg /tmp/python.pkg -target /
          PYBIN="/Library/Frameworks/Python.framework/Versions/3.12/bin/python3"
          echo "PYBIN=$PYBIN" >> "$GITHUB_ENV"
          # Confirm the interpreter itself is universal2 (both slices present).
          lipo -archs "$PYBIN" | tee /dev/stderr | grep -q "x86_64"
          lipo -archs "$PYBIN" | grep -q "arm64"

      - name: Install universal2 dependencies (fuse single-arch wheels)
        shell: bash
        env:
          # Every runtime dependency of the desktop build. wsproto (pure Python)
          # stands in for websockets/uvloop/httptools, which ship no universal2
          # wheel and whose fused C extensions we don't want to chase.
          REQS: fastapi uvicorn httpx[socks] pycryptodome aiosqlite jinja2 pillow python-multipart pywebview wsproto pyinstaller
        run: |
          set -euxo pipefail
          export PATH="/Library/Frameworks/Python.framework/Versions/3.12/bin:$PATH"
          "$PYBIN" -m pip install --upgrade pip "delocate>=0.11"

          # Many popular packages (pillow, pydantic-core, ...) stopped shipping
          # universal2 wheels and now publish separate arm64 + x86_64 wheels. We
          # can't force-download a universal2 wheel that doesn't exist, so instead
          # we fetch BOTH single-arch wheel sets and fuse each pair into a
          # universal2 wheel with delocate. Wheels that are already universal2 or
          # pure-Python are used as-is.
          "$PYBIN" -m pip download --only-binary=:all: --implementation cp \
            --platform macosx_11_0_arm64 --python-version 3.12 \
            --dest wheels_arm $REQS
          # Pin the exact versions the arm64 resolve chose, so the x86_64 resolve
          # matches package-for-package (delocate-merge needs identical versions).
          "$PYBIN" - <<'PY'
          import pathlib
          cons = set()
          for whl in pathlib.Path("wheels_arm").glob("*.whl"):
              name, ver = whl.name.split("-")[:2]
              cons.add(f"{name}=={ver}")
          pathlib.Path("constraints.txt").write_text("\n".join(sorted(cons)) + "\n")
          print(pathlib.Path("constraints.txt").read_text())
          PY
          "$PYBIN" -m pip download --only-binary=:all: --implementation cp \
            --platform macosx_10_13_x86_64 --python-version 3.12 \
            -c constraints.txt --dest wheels_x86 $REQS

          # Fuse arch-specific pairs; copy already-fat / pure-Python wheels.
          mkdir -p fused
          "$PYBIN" - <<'PY'
          import pathlib, shutil, subprocess, sys
          arm, x86, out = map(pathlib.Path, ("wheels_arm", "wheels_x86", "fused"))
          def key(p):  # (package, version)
              parts = p.name.split("-"); return (parts[0].lower(), parts[1])
          x86_by = {key(p): p for p in x86.glob("*.whl")}
          for w in sorted(arm.glob("*.whl")):
              n = w.name
              if "universal2" in n or n.endswith("-none-any.whl") or "macosx" not in n:
                  shutil.copy(w, out / n)          # already fat, or pure-Python
                  continue
              other = x86_by.get(key(w))
              if not other:
                  sys.exit(f"no x86_64 wheel matching {n}")
              subprocess.run(["delocate-merge", str(w), str(other), "-w", str(out)], check=True)
          print("fused wheels:", sorted(p.name for p in out.glob("*.whl")))
          PY

          # Install the fused universal2 (+ pure-Python) wheels offline.
          "$PYBIN" -m pip install --no-index --find-links fused \
            --target "$GITHUB_WORKSPACE/uni_site" $REQS

      - name: Build universal2 app with PyInstaller
        shell: bash
        env:
          PYINSTALLER_TARGET_ARCH: universal2
          PYTHONPATH: ${{ github.workspace }}/uni_site
        run: |
          set -euxo pipefail
          # app/ and web/ come from the checkout; deps come from uni_site.
          "$PYBIN" -m PyInstaller --noconfirm --clean desktop.spec
          # Fail unless the frozen binary really is a fat (both-arch) Mach-O.
          BIN="dist/MegaBasterd.app/Contents/MacOS/MegaBasterd"
          lipo -archs "$BIN"
          lipo -archs "$BIN" | grep -q "x86_64"
          lipo -archs "$BIN" | grep -q "arm64"

      - name: Package (macOS universal .app)
        shell: bash
        run: |
          set -eux
          ditto -c -k --keepParent "dist/MegaBasterd.app" \
            "MegaBasterd-${VERSION}-macos-universal.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: MegaBasterd-macos-universal
          path: MegaBasterd-*.zip
          if-no-files-found: error

      - name: Upload asset to release
        if: env.IS_DRY_RUN != 'true'
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "v$VERSION" MegaBasterd-*.zip \
            --repo "$GITHUB_REPOSITORY" --clobber
