<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MegaBasterd-Py</title>
    <script>
        (function () {
            try {
                var t = localStorage.getItem("mb-theme");
                if (!t) t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
                document.documentElement.setAttribute("data-theme", t);
                var cached = localStorage.getItem("mb-accent-vars");
                if (cached) {
                    var vars = JSON.parse(cached)[t] || {};
                    for (var k in vars) document.documentElement.style.setProperty(k, vars[k]);
                }
            } catch (e) {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>
    <link rel="stylesheet" href="/static/css/style.css?v={{ asset_version }}">
</head>
<body>
    <header>
        <h1>MegaBasterd <span class="version">{{ app_version }}</span> <span class="subtitle">python port</span></h1>
        <nav>
            <a class="nav-btn active" href="/" aria-current="page">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
                Home
            </a>
            <a class="nav-btn" href="/watch">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
                Stream
            </a>
            <a class="nav-btn" href="/settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M4 8h5"/><circle cx="11.5" cy="8" r="2.2"/><path d="M14 8h6"/><path d="M4 16h9"/><circle cx="15.5" cy="16" r="2.2"/><path d="M18 16h2"/></svg>
                Settings
            </a>
            <button class="nav-btn icon-only" data-accent-picker type="button" aria-label="Choose accent color" aria-haspopup="listbox">
                <span class="accent-dot"></span>
            </button>
            <button class="nav-btn icon-only theme-toggle" data-theme-toggle type="button" aria-label="Toggle light and dark theme">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </nav>
    </header>

    <main>
        <section class="card">
            <h2>Add downloads</h2>
            <form id="download-form">
                <textarea name="links" id="download-links" rows="4" placeholder="https://mega.nz/file/...&#10;https://mega.nz/folder/...&#10;one link per line -- file links are queued right away, folder links open a picker" required></textarea>
                <button type="submit">Add to queue</button>
            </form>
        </section>

        <section class="card">
            <h2>New upload</h2>
            <form id="upload-form">
                <select name="email" id="upload-account" required>
                    <option value="">Select account...</option>
                </select>
                <input type="text" name="file_path" placeholder="/absolute/path/to/file" required>
                <button type="submit">Upload</button>
            </form>
            <p class="hint">Manage accounts on the <a href="/settings">Settings</a> page.</p>
        </section>

        <section class="card">
            <h2>Transfers <span id="global-speed" class="subtitle"></span></h2>
            <div class="row-actions">
                <button type="button" id="pause-all-btn">Pause all</button>
                <button type="button" id="resume-all-btn">Resume all</button>
                <button type="button" id="stop-all-btn">Stop all</button>
                <button type="button" id="clear-finished-btn">Clear downloaded</button>
            </div>
            <ul id="transfer-list"></ul>
        </section>
    </main>

    <div id="folder-picker-overlay" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Select files to download</h2>
                <button type="button" id="folder-picker-close" class="modal-close" aria-label="Close">&times;</button>
            </div>
            <div id="folder-picker-summary" class="modal-summary">Nothing selected</div>
            <div id="folder-picker-body" class="modal-body"></div>
            <div class="modal-footer">
                <div class="modal-footer-group">
                    <button type="button" id="folder-picker-select-all">Select all</button>
                    <button type="button" id="folder-picker-select-none">Select none</button>
                </div>
                <div class="modal-footer-group">
                    <button type="button" id="folder-picker-cancel-btn">Cancel</button>
                    <button type="button" id="folder-picker-download-btn">Download selected</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/theme.js?v={{ asset_version }}"></script>
    <script src="/static/js/app.js?v={{ asset_version }}"></script>
</body>
</html>
